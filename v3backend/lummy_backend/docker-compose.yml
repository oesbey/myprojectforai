version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: lummy_db
    restart: always
    environment:
      POSTGRES_USER: lummy_admin
      POSTGRES_PASSWORD: LummySuperSecretPassword123!
      POSTGRES_DB: lummy_database
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: lummy_redis
    restart: always
    ports:
      - "6379:6379"

  api:
    build: ./api
    container_name: lummy_api
    restart: always
    ports:
      - "3000:3000"
    depends_on:
      - postgres
      - redis

volumes:
  pgdata:
